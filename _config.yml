# Site
name: "꿀랭킹"
title: "꿀랭킹"
description: "꿀랭킹, 똑똑한 소비를 위한 인기순위"
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: ''
url: 'https://honeyranking.com'
# 사이트 언어 (SEO 및 메타 태그용)
language: ko
# 소셜 공유 카드(jekyll-seo-tag): 카카오톡·X 등에서 링크가 큰 이미지 카드로 표시 → 공유 시 클릭률↑
image: assets/images/logo.png
twitter:
  card: summary_large_image
#google_analytics: 'UA-xxxxxxxx-1'
#disqus: 'demowebsite'
#mailchimp-list: 'https://wowthemes.us11.list-manage.com/subscribe/post?u=8aeb20a530e124561927d3bd8&amp;id=8c3d2d214b'
include: ["_pages"]
permalink: /:title/
email: ggulrank@gmail.com

# Authors
authors:
  honeyranking:
    name: 꿀랭킹
    display_name: 꿀랭킹
    avatar: 'assets/images/avatar.png'
    #gravatar: e56154546cf4be74e393c62d1ae9f9d4
    email: ggulrank@gmail.com
    web: '/about'
    #twitter: https://twitter.com/wowthemesnet
    description: "꿀랭킹은 쿠팡에서 판매 중인 인기 상품을 카테고리별로 모아 가격·순위와 함께 비교하고, 카테고리별 '고르는 법'과 자주 묻는 질문을 정리해 똑똑한 소비를 돕는 쇼핑 정보 사이트입니다. 표시 가격은 작성 시점 기준이며 실제 가격은 쿠팡에서 변동될 수 있습니다."
 
# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-figure
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
highlighter: rouge
markdown: kramdown
kramdown:
   syntax_highlighter_opts:
      disable : true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "enabled"

# Post Author Box ("enabled" or "disabled")
authorbox: "enabled"

# Sass
sass:
  sass_dir: _sass
  style: compressed

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
